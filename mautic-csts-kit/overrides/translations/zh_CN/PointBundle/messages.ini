mautic.point.action.empty.what_are_point_actions_desc="这些是你创建的用于自动调整联系人积分的规则。你可以为每个操作控制积分值（正或负），使系统契合你的业务。"
mautic.point.trigger.onboarding.step1="创建一个新的触发器，并设置联系人必须达到的最低积分数。"
mautic.point.trigger.onboarding.step3="发布该触发器。你可以选择是否立即将其应用到已符合标准的现有联系人。"
mautic.point.form.repeat.help="启用后，此操作可对联系人多次计分；禁用则为一次性计分。"
mautic.point.group.onboarding.subheading="超越单一参与度得分。分组允许你根据不同类型的互动或兴趣对积分进行分类。"
mautic.point.group.form.group_descr="选择此设置所适用的积分组。如果未选择任何组，则将应用于联系人的主积分。"
mautic.point.trigger.form.color_descr="积分达到上述数值的联系人将被指定为该颜色。"
mautic.point.trigger.noresults.tip="创建一个触发器，在联系人达到某一积分等级时对其执行某些操作。你可以调整联系人的推广活动、推送到 CRM、发送邮件等。定义一个颜色，以便在查看联系人列表时一眼看出联系人所处的等级！"
mautic.point.trigger.form.points_descr="触发关联操作所需的最低积分数。"
mautic.point.action.delta.help="设置此操作要增加或扣除的积分数量。如果为正数，将加到联系人的积分上；如果为负数，则扣除。"
mautic.point.trigger.onboarding.copy="当联系人达到特定分数时，触发器会立即执行预定义操作——例如更改细分、添加标签或推送到你的 CRM。"
mautic.point.action.empty.subheading="别再猜测哪些联系人真正参与进来了！将后续跟进的精力完全集中在成交上。"
mautic.point.group.onboarding.copy="针对与特定产品线、内容主题或漏斗阶段的互动，分别跟踪不同的得分。这能让你更深入地了解联系人的兴趣所在，而不仅仅是他们的整体参与度。"
mautic.point.trigger.empty.subheading="当联系人的参与度（以积分衡量）达到关键阈值时，自动做出响应。"
mautic.point.action.empty.score_contacts_desc="当联系人下载资源、访问你的定价页面、打开关键邮件或提交关键表单时，自动为其分配积分。"
mautic.point.trigger.onboarding.notification.content="只要达到积分阈值，它们就会激活，确保基于参与度等级立即采取行动。"
mautic.point.action.noresults.tip="使用积分操作，根据定义的事件调整联系人的积分。例如，如果联系人打开了一封推广活动邮件，可为其增加 10 积分。"
